name: Warmup Prices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Vaultwarden
        uses: matheus1lva/vaultwarden-replace-secrets-action@master
        with:
          BW_CLIENTID: ${{ secrets.BW_CLIENTID }}
          BW_CLIENTSECRET: ${{ secrets.BW_CLIENTSECRET }}
          BW_PASSWORD: ${{ secrets.BW_PASSWORD }}
          BW_SERVER: ${{ vars.BW_SERVER }}
          VAULT_ITEM: ${{ vars.BW_VAULT_ITEM }}
          FILES_TO_REPLACE: |
            .env.example

      - name: Load secrets into environment
        run: |
          while IFS='=' read -r key value; do
            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done < .env.example.replaced

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run warmup

name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Vaultwarden
        uses: matiuhart/vaultwarden-replace-secrets-action@master
        with:
          BW_CLIENTID: ${{ secrets.BW_CLIENTID }}
          BW_CLIENTSECRET: ${{ secrets.BW_CLIENTSECRET }}
          BW_PASSWORD: ${{ secrets.BW_PASSWORD }}
          BW_SERVER: ${{ vars.BW_SERVER }}
          FILES_TO_REPLACE: |
            .env.example

      - name: Load secrets into environment
        run: |
          while IFS='=' read -r key value; do
            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done < .env.example.replaced

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Upload secrets to Cloudflare
        run: |
          jq -Rn '[inputs | split("=") | {(.[0]): .[1:] | join("=")}] | add' \
            .env.example.replaced | bunx wrangler secret bulk

      - name: Run migrations
        run: bun run migrate

      - name: Warm price cache
        run: bun run warmup

      - run: bun run deploy
